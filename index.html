<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake II</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a1a1a;
    font-family: 'Courier New', monospace;
  }

  .phone {
    background: linear-gradient(160deg, #3a3a3a, #1c1c1c);
    border-radius: 28px;
    padding: 22px 22px 30px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 2px 4px rgba(255,255,255,0.1);
    width: 380px;
  }

  .brand {
    text-align: center;
    color: #999;
    font-size: 13px;
    letter-spacing: 4px;
    margin-bottom: 8px;
    font-weight: bold;
  }

  .screen-frame {
    background: #0a0a0a;
    border-radius: 8px;
    padding: 10px;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
  }

  .screen {
    background: #9ead86;
    background: linear-gradient(180deg, #a3b88c, #93a879);
    border-radius: 3px;
    padding: 8px;
    box-shadow: inset 0 0 15px rgba(0,0,0,0.35);
    position: relative;
  }

  .statusbar {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #2b3320;
    padding: 2px 4px 6px;
    border-bottom: 1px solid rgba(43,51,32,0.4);
    margin-bottom: 4px;
    font-weight: bold;
  }

  canvas {
    display: block;
    width: 100%;
    image-rendering: pixelated;
    background: transparent;
  }

  .msg-overlay {
    position: absolute;
    inset: 8px;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #2b3320;
    background: rgba(163,184,140,0.92);
    font-weight: bold;
  }
  .msg-overlay.show { display: flex; }
  .msg-overlay h2 { margin: 0 0 6px; font-size: 20px; letter-spacing: 1px; }
  .msg-overlay p { margin: 2px 0; font-size: 13px; }

  .controls-hint {
    text-align: center;
    color: #888;
    font-size: 11px;
    margin-top: 14px;
    letter-spacing: 1px;
  }

  .dpad-row {
    display: flex;
    justify-content: center;
    margin-top: 16px;
    gap: 10px;
  }
  .dpad {
    display: grid;
    grid-template-columns: 44px 44px 44px;
    grid-template-rows: 44px 44px 44px;
    gap: 4px;
  }
  .dpad button {
    background: linear-gradient(160deg,#4a4a4a,#2a2a2a);
    border: 1px solid #555;
    border-radius: 6px;
    color: #bbb;
    font-size: 16px;
    cursor: pointer;
    user-select: none;
  }
  .dpad button:active { background: #1a1a1a; }
  .dpad .up { grid-column: 2; grid-row: 1; }
  .dpad .left { grid-column: 1; grid-row: 2; }
  .dpad .center { grid-column: 2; grid-row: 2; visibility: hidden; }
  .dpad .right { grid-column: 3; grid-row: 2; }
  .dpad .down { grid-column: 2; grid-row: 3; }

  .action-row {
    display: flex;
    justify-content: center;
    margin-top: 12px;
  }
  .action-row button {
    background: linear-gradient(160deg,#4a4a4a,#2a2a2a);
    border: 1px solid #555;
    border-radius: 16px;
    color: #ccc;
    padding: 8px 22px;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
  }
  .action-row button:active { background: #1a1a1a; }
</style>
</head>
<body>

<div class="phone">
  <div class="brand">NOKIA</div>
  <div class="screen-frame">
    <div class="screen">
      <div class="statusbar">
        <span id="scoreLabel">SCORE: 0</span>
        <span id="bestLabel">BEST: 0</span>
      </div>
      <canvas id="game" width="240" height="240"></canvas>
      <div class="msg-overlay" id="overlay">
        <h2 id="overlayTitle">SNAKE II</h2>
        <p id="overlaySub">Press a direction or SPACE to start</p>
      </div>
    </div>
  </div>

  <div class="dpad-row">
    <div class="dpad">
      <button class="up" id="btnUp">&#9650;</button>
      <button class="left" id="btnLeft">&#9664;</button>
      <div class="center"></div>
      <button class="right" id="btnRight">&#9654;</button>
      <button class="down" id="btnDown">&#9660;</button>
    </div>
  </div>
  <div class="action-row">
    <button id="btnPause">PAUSE / START</button>
  </div>

  <div class="controls-hint">ARROW KEYS or WASD &middot; SPACE to pause</div>
</div>

<script>
(function() {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const GRID = 20;               // 20x20 cells
  const CELL = canvas.width / GRID;

  const scoreLabel = document.getElementById('scoreLabel');
  const bestLabel = document.getElementById('bestLabel');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlaySub = document.getElementById('overlaySub');

  const COLOR_BG = '#a3b88c';
  const COLOR_DIM = 'rgba(43,51,32,0.15)';
  const COLOR_SNAKE = '#2b3320';
  const COLOR_HEAD = '#1c2415';
  const COLOR_FOOD = '#2b3320';

  let snake, dir, nextDir, food, score, best, running, gameOver, tickMs, timer;
  best = 0;

  function initState() {
    snake = [
      {x: 9, y: 10}, {x: 8, y: 10}, {x: 7, y: 10}
    ];
    dir = {x: 1, y: 0};
    nextDir = {x: 1, y: 0};
    score = 0;
    tickMs = 130;
    gameOver = false;
    placeFood();
    updateLabels();
  }

  function placeFood() {
    let valid = false;
    while (!valid) {
      food = {
        x: Math.floor(Math.random() * GRID),
        y: Math.floor(Math.random() * GRID)
      };
      valid = !snake.some(s => s.x === food.x && s.y === food.y);
    }
  }

  function updateLabels() {
    scoreLabel.textContent = 'SCORE: ' + score;
    bestLabel.textContent = 'BEST: ' + best;
  }

  function drawGrid() {
    ctx.fillStyle = COLOR_BG;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = COLOR_DIM;
    ctx.lineWidth = 1;
    for (let i = 0; i <= GRID; i++) {
      ctx.beginPath();
      ctx.moveTo(i * CELL, 0);
      ctx.lineTo(i * CELL, canvas.height);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * CELL);
      ctx.lineTo(canvas.width, i * CELL);
      ctx.stroke();
    }
  }

  function drawCell(x, y, color, inset) {
    inset = inset || 1;
    ctx.fillStyle = color;
    ctx.fillRect(x * CELL + inset, y * CELL + inset, CELL - inset * 2, CELL - inset * 2);
  }

  function draw() {
    drawGrid();
    snake.forEach((s, i) => {
      drawCell(s.x, s.y, i === 0 ? COLOR_HEAD : COLOR_SNAKE, i === 0 ? 0.5 : 1.5);
    });
    // food drawn as a little diamond blip
    ctx.fillStyle = COLOR_FOOD;
    const cx = food.x * CELL + CELL / 2;
    const cy = food.y * CELL + CELL / 2;
    const r = CELL / 2 - 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy - r);
    ctx.lineTo(cx + r, cy);
    ctx.lineTo(cx, cy + r);
    ctx.lineTo(cx - r, cy);
    ctx.closePath();
    ctx.fill();
  }

  function step() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // wrap around edges, classic Nokia style
    if (head.x < 0) head.x = GRID - 1;
    if (head.x >= GRID) head.x = 0;
    if (head.y < 0) head.y = GRID - 1;
    if (head.y >= GRID) head.y = 0;

    // self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      endGame();
      return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += 10;
      if (score > best) best = score;
      updateLabels();
      placeFood();
      if (tickMs > 55) tickMs -= 3; // speed up gradually
      restartTimer();
    } else {
      snake.pop();
    }

    draw();
  }

  function restartTimer() {
    clearInterval(timer);
    timer = setInterval(step, tickMs);
  }

  function endGame() {
    gameOver = true;
    running = false;
    clearInterval(timer);
    overlayTitle.textContent = 'GAME OVER';
    overlaySub.textContent = 'Score ' + score + ' — press SPACE to retry';
    overlay.classList.add('show');
    draw();
  }

  function startGame() {
    initState();
    running = true;
    overlay.classList.remove('show');
    draw();
    restartTimer();
  }

  function togglePause() {
    if (gameOver || !running && !snake) {
      startGame();
      return;
    }
    if (!running) {
      running = true;
      overlay.classList.remove('show');
      restartTimer();
    } else {
      running = false;
      clearInterval(timer);
      overlayTitle.textContent = 'PAUSED';
      overlaySub.textContent = 'Press SPACE to resume';
      overlay.classList.add('show');
    }
  }

  function setDir(x, y) {
    // prevent reversing directly into itself
    if (snake.length > 1 && dir.x === -x && dir.y === -y) return;
    nextDir = {x, y};
    if (!running && !gameOver) {
      running = true;
      overlay.classList.remove('show');
      restartTimer();
    }
  }

  document.addEventListener('keydown', (e) => {
    switch (e.key) {
      case 'ArrowUp': case 'w': case 'W': setDir(0, -1); e.preventDefault(); break;
      case 'ArrowDown': case 's': case 'S': setDir(0, 1); e.preventDefault(); break;
      case 'ArrowLeft': case 'a': case 'A': setDir(-1, 0); e.preventDefault(); break;
      case 'ArrowRight': case 'd': case 'D': setDir(1, 0); e.preventDefault(); break;
      case ' ': togglePause(); e.preventDefault(); break;
    }
  });

  document.getElementById('btnUp').addEventListener('click', () => setDir(0, -1));
  document.getElementById('btnDown').addEventListener('click', () => setDir(0, 1));
  document.getElementById('btnLeft').addEventListener('click', () => setDir(-1, 0));
  document.getElementById('btnRight').addEventListener('click', () => setDir(1, 0));
  document.getElementById('btnPause').addEventListener('click', togglePause);

  // swipe support for mobile
  let touchStart = null;
  canvas.addEventListener('touchstart', (e) => {
    touchStart = e.touches[0];
  }, {passive: true});
  canvas.addEventListener('touchend', (e) => {
    if (!touchStart) return;
    const dx = e.changedTouches[0].clientX - touchStart.clientX;
    const dy = e.changedTouches[0].clientY - touchStart.clientY;
    if (Math.abs(dx) > Math.abs(dy)) {
      setDir(dx > 0 ? 1 : -1, 0);
    } else {
      setDir(0, dy > 0 ? 1 : -1);
    }
    touchStart = null;
  }, {passive: true});

  // initial state (not yet running)
  snake = null;
  running = false;
  gameOver = false;
  initState();
  draw();
  overlay.classList.add('show');
})();
</script>

</body>
</html>
